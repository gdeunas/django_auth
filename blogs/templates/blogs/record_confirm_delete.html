<!-- record_confirm_delete.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Форма Record</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Удалить Запись</h1>
    <p>Вы уверены, что хотите удалить {{ record.title }}</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'blogs:records_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
<script src="/static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
